<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="2px">
        <tr>
            <th>Employee name</th>
            <th>Employee id</th>
            <th>Employee salary</th>
        </tr>
        {% for x in data %}
        <tr>
            <td>{{x.emp_name}}</td>
            <td>{{x.emp_id}}</td>
            <td>{{x.emp_salary}}</td>
        </tr>
        {% endfor %}

    </table>
    

    <form method="post">
        {%  csrf_token %}

        {{form.as_p}}
        <input type="submit" value="submit">
    </form>
</body>
</html>
